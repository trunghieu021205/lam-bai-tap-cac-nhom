<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Tailwind CSS Exercise</title>
  </head>
  <body class="bg-gray-100 font-sans">
    <nav
      class="bg-[#1d4ed8] p-4 text-white flex justify-between items-center shadow-md"
    >
      <div class="font-bold text-lg">MySite</div>

      <div class="md:hidden cursor-pointer">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          class="h-6 w-6"
          fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M4 6h16M4 12h16m-7 6h7"
          />
        </svg>
      </div>

      <ul class="hidden md:flex space-x-6 text-sm">
        <li><a href="#" class="hover:text-gray-200">Home</a></li>
        <li><a href="#" class="hover:text-gray-200">About</a></li>
        <li><a href="#" class="hover:text-gray-200">Contact</a></li>
      </ul>
    </nav>

    <main class="flex justify-center min-h-[calc(100vh-64px)] p-6">
      <div
        class="p-8 md:p-12 w-full max-w-4xl flex flex-col md:flex-row items-center justify-center gap-10"
      >
        <div class="flex items-center space-x-4">
          <img
            src="https://upload.wikimedia.org/wikipedia/commons/d/d5/Tailwind_CSS_Logo.svg"
            alt="Tailwind Logo"
            class="w-16 h-16 md:w-40 md:h-40"
          />
          <h1 class="text-3xl md:text-4xl font-bold text-slate-700">
            Tailwind CSS
          </h1>
        </div>

        <div class="text-center md:text-left">
          <h2 class="text-xl font-bold text-gray-800">Learn Tailwind CSS</h2>
          <p class="text-blue-500 text-sm mt-2 mx-auto md:mx-0">
            Build responsive layouts quickly with utility-first CSS.
          </p>

          <button
            class="mt-5 bg-[#1d4ed8] text-white px-8 py-2 rounded-md text-sm font-medium hover:bg-blue-800 transition-colors"
          >
            Get Started
          </button>
        </div>
      </div>
    </main>
  </body>
</html>
